<!DOCTYPE html>
<html>
<head>
  <title>Phishing Shield - AI Protection</title>
  <style>
    body { font-family: system-ui; max-width: 800px; margin: 50px auto; padding: 20px; text-align: center; }
    .hero { background: linear-gradient(135deg, #e94560, #0f3460); color: white; padding: 60px 40px; border-radius: 20px; }
    h1 { font-size: 3rem; margin-bottom: 20px; }
    .btn { display: inline-block; padding: 15px 30px; background: #2ed573; color: white; text-decoration: none; border-radius: 10px; margin: 10px; font-weight: bold; }
    .features { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; margin: 50px 0; }
    .feature { padding: 20px; }
    .demo { background: #f5f5f5; padding: 40px; border-radius: 15px; margin: 40px 0; }
    input { padding: 15px; width: 60%; font-size: 1rem; border-radius: 8px; border: 2px solid #ddd; }
    button { padding: 15px 30px; background: #e94560; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
    #result { margin-top: 20px; padding: 20px; border-radius: 10px; display: none; }
  </style>
</head>
<body>
  <div class="hero">
    <h1>🛡️ Phishing Shield</h1>
    <p style="font-size: 1.3rem;">AI-powered protection against phishing attacks</p>
    <a href="#" class="btn">Add to Chrome</a>
    <a href="https://github.com/aneela-ameen/phishing-shield" class="btn" style="background: #333;">GitHub</a>
  </div>
  
  <div class="features">
    <div class="feature">
      <h2>⚡ Real-time</h2>
      <p>Instant analysis of every website you visit</p>
    </div>
    <div class="feature">
      <h2>🤖 AI Powered</h2>
      <p>96% accuracy with ensemble ML models</p>
    </div>
    <div class="feature">
      <h2>🔒 Privacy First</h2>
      <p>Your data never leaves your browser</p>
    </div>
  </div>
  
  <div class="demo">
    <h2>Try it now</h2>
    <input type="text" id="url-input" placeholder="Enter URL to check...">
    <button onclick="checkUrl()">Check</button>
    <div id="result"></div>
  </div>
  
  <script>
    async function checkUrl() {
      const url = document.getElementById('url-input').value;
      const resultDiv = document.getElementById('result');
      
      resultDiv.style.display = 'block';
      resultDiv.innerHTML = 'Checking...';
      
      try {
        const response = await fetch('https://phishing-detector-api.onrender.com/check', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });
        
        const data = await response.json();
        
        resultDiv.style.background = data.is_phishing ? '#ffebee' : '#e8f5e9';
        resultDiv.style.color = data.is_phishing ? '#c62828' : '#2e7d32';
        resultDiv.innerHTML = `
          <h3>${data.is_phishing ? '⚠️ PHISHING DETECTED' : '✅ SAFE'}</h3>
          <p>Confidence: ${(data.confidence * 100).toFixed(1)}%</p>
          <p>Risk Level: ${data.risk_level}</p>
        `;
      } catch (err) {
        resultDiv.innerHTML = 'Error: ' + err.message;
      }
    }
  </script>
</body>
</html>
