<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Phishing Shield Settings</title>
  <style>
    body {
      font-family: system-ui;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      background: #1a1a2e;
      color: #eaeaea;
    }
    h1 { color: #00d9ff; }
    .setting {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 12px;
      margin: 20px 0;
    }
    label {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }
    input[type="checkbox"] {
      width: 20px;
      height: 20px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin: 30px 0;
    }
    .stat-box {
      background: rgba(0,217,255,0.1);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }
    .stat-value {
      font-size: 2rem;
      font-weight: bold;
      color: #00d9ff;
    }
    button {
      padding: 12px 24px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover {
      background: #ff6b6b;
    }
  </style>
</head>
<body>
  <h1>🛡️ Phishing Shield Settings</h1>
  
  <div class="stats">
    <div class="stat-box">
      <div class="stat-value" id="check-count">0</div>
      <div>Sites Checked</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="block-count">0</div>
      <div>Threats Detected</div>
    </div>
    <div class="stat-box">
      <div class="stat-value">96%</div>
      <div>Accuracy</div>
    </div>
  </div>
  
  <div class="setting">
    <label>
      <input type="checkbox" id="auto-check" checked>
      <div>
        <strong>Auto-check websites</strong>
        <p style="margin: 5px 0 0; color: #888; font-size: 0.9rem;">
          Automatically analyze sites when you visit them
        </p>
      </div>
    </label>
  </div>
  
  <div class="setting">
    <label>
      <input type="checkbox" id="notifications" checked>
      <div>
        <strong>Show notifications</strong>
        <p style="margin: 5px 0 0; color: #888; font-size: 0.9rem;">
          Alert me when phishing sites are detected
        </p>
      </div>
    </label>
  </div>
  
  <button onclick="saveSettings()">💾 Save Settings</button>
  <button onclick="clearCache()" style="background: #666;">🗑️ Clear Cache</button>
  
  <script>
    // Load settings
    chrome.storage.local.get(['checkCount', 'blockedCount', 'settings'], (data) => {
      document.getElementById('check-count').textContent = data.checkCount || 0;
      document.getElementById('block-count').textContent = data.blockedCount || 0;
      
      const settings = data.settings || {};
      document.getElementById('auto-check').checked = settings.autoCheck !== false;
      document.getElementById('notifications').checked = settings.showNotifications !== false;
    });
    
    function saveSettings() {
      const settings = {
        autoCheck: document.getElementById('auto-check').checked,
        showNotifications: document.getElementById('notifications').checked
      };
      
      chrome.storage.local.set({ settings }, () => {
        alert('⚙️ Settings saved!');
      });
    }
    
    function clearCache() {
      if (confirm('Clear all cached data?')) {
        chrome.storage.local.remove(['checkCount', 'blockedCount'], () => {
          location.reload();
        });
      }
    }
  </script>
</body>
</html>
